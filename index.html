<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phúc Baccarat PRO</title>

<style>
body {
  background: #000;
  color: #fff;
  text-align: center;
  font-family: Arial;
}

button {
  padding: 20px;
  margin: 10px;
  font-size: 20px;
  border: none;
  border-radius: 15px;
  width: 80px;
}

.b { background: #2196F3; }
.p { background: #f44336; }
.t { background: #4CAF50; }

.bar {
  width: 80%;
  height: 20px;
  margin: 20px auto;
  background: #333;
  border-radius: 20px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: linear-gradient(to right, red, blue);
  width: 50%;
  transition: 0.5s;
}

.history {
  margin-top: 20px;
}
.dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  margin: 3px;
}
</style>
</head>

<body>

<h2>🔥 Phúc Baccarat PRO</h2>

<button class="b" onclick="add('B')">B</button>
<button class="p" onclick="add('P')">P</button>
<button class="t" onclick="add('T')">T</button>

<div class="bar">
  <div class="fill" id="bar"></div>
</div>

<div id="percent">P 50% - B 50%</div>
<div id="suggest"></div>

<div class="history" id="history"></div>

<br>
<button onclick="reset()">Reset</button>

<script>
let data = JSON.parse(localStorage.getItem("bac") || "[]");

function save() {
  localStorage.setItem("bac", JSON.stringify(data));
}

function add(x) {
  data.push(x);
  if (data.length > 20) data.shift();
  save();
  render();
}

function reset() {
  data = [];
  save();
  render();
}

function analyze() {
  let last = data.slice(-6);
  let b = last.filter(x=>x=="B").length;
  let p = last.filter(x=>x=="P").length;

  let total = b + p;
  if (total == 0) return [50,50,"CHỜ"];

  let pb = Math.round((p/total)*100);
  let bb = 100 - pb;

  let suggest = "BỎ";
  if (pb > 60) suggest = "NÊN P";
  else if (bb > 60) suggest = "NÊN B";

  return [pb, bb, suggest];
}

function render() {
  let [p,b,s] = analyze();

  document.getElementById("percent").innerText =
    "P "+p+"% - B "+b+"%";

  document.getElementById("bar").style.width = p+"%";
  document.getElementById("suggest").innerText = "👉 "+s;

  let h = document.getElementById("history");
  h.innerHTML = "";

  data.forEach(x=>{
    let d = document.createElement("div");
    d.className = "dot";
    if (x=="B") d.style.background="#2196F3";
    if (x=="P") d.style.background="#f44336";
    if (x=="T") d.style.background="#4CAF50";
    h.appendChild(d);
  });
}

render();
</script>

</body>
</html>
